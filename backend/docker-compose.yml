version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: ai-emergency-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build: .
    container_name: ai-emergency-backend
    ports:
      - '5000:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/ai-emergency-assistant
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
    depends_on:
      - mongodb

volumes:
  mongo-data:
